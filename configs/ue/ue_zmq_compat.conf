[rf]
device_name = zmq
device_args = tx_port=tcp://127.0.0.1:2002,rx_port=tcp://127.0.0.1:2003,base_srate=23.04e6
freq_offset = 0
tx_gain = 50
rx_gain = 40
srate = 23.04e6
nof_antennas = 1
time_adv_nsamples = 300

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106

[rrc]
release = 15
ue_category = 4

[usim]
mode = soft
algo = milenage
imsi = 001010123456780
imei = 353490069873319
k = 00112233445566778899AABBCCDDEEFF
opc = 63BFA50EE6523365FF14C1F45F88737D

[nas]
apn = internet
apn_protocol = ipv4

[gw]
netns = ue1
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[pcap]
enable = true

[log]
filename = ./outputs/logs/ue/ue.log
all_level = info
