gnb_id: 411
gnb_id_bit_length: 22
ran_node_name: sitl-gnb01-compat

cu_cp:
  amf:
    addr: 10.10.0.10
    port: 38412
    bind_addr: 10.10.0.2
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
                sd: 1
              - sst: 1
                sd: 2
              - sst: 1
                sd: 3
  inactivity_timer: 7200

cu_up:
  ngu:
    socket:
      - bind_addr: 10.20.0.2
    gtpu:
      queue_size: 2046
      batch_size: 256
      reordering_timer: 0

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 20
  common_scs: 15
  plmn: "00101"
  tac: 7
  pci: 1
  pdcch:
    common:
      ss0_index: 0
      coreset0_index: 12
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
  prach:
    prach_config_index: 1
    total_nof_ra_preambles: 64
    nof_ssb_per_ro: 1
    nof_cb_preambles_per_ssb: 64
  nof_antennas_dl: 1
  nof_antennas_ul: 1
  slicing:
    - sst: 1
      sd: 1
    - sst: 1
      sd: 2
    - sst: 1
      sd: 3

ru_sdr:
  device_driver: zmq
  device_args: tx_port=tcp://127.0.0.1:2000,rx_port=tcp://127.0.0.1:2001,base_srate=23.04e6
  srate: 23.04
  tx_gain: 50
  rx_gain: 40

log:
  filename: ./outputs/logs/gnb/gnb.log
  all_level: info

pcap:
  mac_enable: true
  mac_filename: ./outputs/pcap/gnb_mac.pcap
  ngap_enable: true
  ngap_filename: ./outputs/pcap/gnb_ngap.pcap
